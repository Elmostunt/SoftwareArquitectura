<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Avistamiento de OVNIs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1a4731, #2d7a4f);
      color: #fff;
      padding: 20px 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .header h1 { font-size: 1.7rem; margin-bottom: 3px; }
    .header p  { opacity: .8; font-size: .9rem; }

    /* ── Layout ── */
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; }

    /* ── Botones ── */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
      transition: opacity .15s, transform .1s;
    }
    .btn:hover  { opacity: .87; }
    .btn:active { transform: scale(.97); }
    .btn-primary   { background: #1a4731; color: #fff; }
    .btn-secondary { background: #e2e8f0; color: #4a5568; }
    .btn-edit      { background: #2b6cb0; color: #fff; }
    .btn-delete    { background: #c53030; color: #fff; margin-left: 6px; }
    .btn-sm        { padding: 5px 12px; font-size: .8rem; }

    /* ── Tabla ── */
    .table-wrapper {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      overflow: hidden;
      overflow-x: auto;
    }
    .empty-msg {
      text-align: center;
      padding: 48px;
      color: #718096;
      font-size: 1rem;
    }
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    thead th {
      background: #1a4731;
      color: #fff;
      padding: 12px 14px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
    }
    tbody td {
      padding: 11px 14px;
      border-bottom: 1px solid #e2e8f0;
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td      { background: #f7fafc; }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: .78rem;
      font-weight: 600;
      background: #bee3f8;
      color: #2a4365;
    }
    .obs-cell {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 30px 32px;
      width: 100%;
      max-width: 640px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 10px 40px rgba(0,0,0,.2);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .modal-header h2 { color: #1a4731; font-size: 1.25rem; }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #718096;
      line-height: 1;
    }
    .modal-close:hover { color: #1a202c; }

    /* ── Formulario ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    .form-group           { display: flex; flex-direction: column; gap: 5px; }
    .form-group.col-2     { grid-column: span 2; }
    .form-group label {
      font-size: .82rem;
      font-weight: 600;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 9px 12px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: .9rem;
      font-family: inherit;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #2d7a4f;
      box-shadow: 0 0 0 3px rgba(45,122,79,.15);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .form-actions { display: flex; gap: 10px; justify-content: flex-end; }

    @media (max-width: 640px) {
      .header h1        { font-size: 1.2rem; }
      .form-grid        { grid-template-columns: 1fr; }
      .form-group.col-2 { grid-column: span 1; }
      .modal            { padding: 20px; }
    }
  </style>
</head>
<body>

<header class="header">
  <h1>🛸 Registro de Avistamiento de OVNIs</h1>
  <p>Versión HTML pura — datos en memoria del navegador</p>
</header>

<main class="container">
  <div class="toolbar">
    <button class="btn btn-primary" onclick="abrirCrear()">+ Nuevo avistamiento</button>
  </div>
  <div class="table-wrapper" id="tabla-container"></div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="cerrarSiOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-titulo">Nuevo Avistamiento de OVNI</h2>
      <button class="modal-close" onclick="cerrarModal()">&times;</button>
    </div>
    <form id="form-avistamiento" onsubmit="guardar(event)">
      <div class="form-grid">
        <div class="form-group">
          <label>Fecha *</label>
          <input type="date" id="f-fecha" required />
        </div>
        <div class="form-group">
          <label>Hora *</label>
          <input type="time" id="f-hora" required />
        </div>
        <div class="form-group col-2">
          <label>Ubicación *</label>
          <input type="text" id="f-ubicacion" required placeholder="Ej: Cerro El Plomo, Santiago" />
        </div>
        <div class="form-group">
          <label>Cantidad de objetos *</label>
          <input type="number" id="f-cantidad" required min="1" value="1" />
        </div>
        <div class="form-group">
          <label>Forma</label>
          <select id="f-forma">
            <option>No identificada</option>
            <option>Disco</option>
            <option>Circular</option>
            <option>Triangular</option>
            <option>Cigarro</option>
            <option>Esfera</option>
            <option>Irregular</option>
            <option>Otra</option>
          </select>
        </div>
        <div class="form-group">
          <label>Registrado por</label>
          <input type="text" id="f-registrado_por" placeholder="Nombre del observador" />
        </div>
        <div class="form-group col-2">
          <label>Observaciones</label>
          <textarea id="f-observaciones" placeholder="Descripción: color, movimiento, sonido, duración..."></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="btn-guardar">Registrar avistamiento</button>
      </div>
    </form>
  </div>
</div>

<script>
  // ── Datos en memoria ─────────────────────────────────────────
  var avistamientos = [
    { id: 1, fecha: '2024-03-15', hora: '22:15', ubicacion: 'Cerro El Plomo, Santiago',          cantidad: 1, forma: 'Disco',          observaciones: 'Objeto luminoso que se desplazaba en silencio a baja altura', registrado_por: 'Juan Pérez'     },
    { id: 2, fecha: '2024-03-16', hora: '03:40', ubicacion: 'Desierto de Atacama, sector norte', cantidad: 3, forma: 'Triangular',      observaciones: 'Tres luces en formación triangular perfecta, inmóviles por 10 min', registrado_por: 'María González' },
    { id: 3, fecha: '2024-03-17', hora: '20:05', ubicacion: 'Caleta Tortel, Aysén',              cantidad: 1, forma: 'Esfera',          observaciones: 'Esfera naranja que descendió hacia el mar y desapareció',      registrado_por: 'Carlos Silva'   },
    { id: 4, fecha: '2024-03-18', hora: '01:30', ubicacion: 'Cajón del Maipo',                   cantidad: 2, forma: 'Cigarro',         observaciones: 'Dos objetos alargados que aceleraron hacia el norte',          registrado_por: 'Ana Martínez'   },
    { id: 5, fecha: '2024-03-19', hora: '23:55', ubicacion: 'Carretera Austral km 340',          cantidad: 1, forma: 'Circular',        observaciones: 'Luz intensa que iluminó el camino por varios segundos',        registrado_por: 'Roberto Díaz'   },
  ];
  var nextId    = 6;
  var editandoId = null;  // null = modo crear, número = modo editar

  // ── Renderizado de la tabla ──────────────────────────────────
  function renderTabla() {
    var contenedor = document.getElementById('tabla-container');

    if (avistamientos.length === 0) {
      contenedor.innerHTML = '<p class="empty-msg">No hay avistamientos registrados. Crea el primero.</p>';
      return;
    }

    var filas = avistamientos.map(function(av) {
      return '<tr>' +
        '<td>' + av.id + '</td>' +
        '<td>' + av.fecha + '</td>' +
        '<td>' + av.hora + '</td>' +
        '<td>' + av.ubicacion + '</td>' +
        '<td><span class="badge">' + av.cantidad + '</span></td>' +
        '<td>' + (av.forma || '—') + '</td>' +
        '<td>' + (av.registrado_por || '—') + '</td>' +
        '<td class="obs-cell">' + (av.observaciones || '—') + '</td>' +
        '<td>' +
          '<button class="btn btn-sm btn-edit"   onclick="abrirEditar(' + av.id + ')">Editar</button>' +
          '<button class="btn btn-sm btn-delete" onclick="eliminar(' + av.id + ')">Eliminar</button>' +
        '</td>' +
      '</tr>';
    }).join('');

    contenedor.innerHTML =
      '<table>' +
        '<thead><tr>' +
          '<th>#</th><th>Fecha</th><th>Hora</th><th>Ubicación</th>' +
          '<th>Cantidad</th><th>Forma</th><th>Registrado por</th>' +
          '<th>Observaciones</th><th>Acciones</th>' +
        '</tr></thead>' +
        '<tbody>' + filas + '</tbody>' +
      '</table>';
  }

  // ── Abrir modal en modo CREAR ────────────────────────────────
  function abrirCrear() {
    editandoId = null;
    document.getElementById('modal-titulo').textContent = 'Nuevo Avistamiento de OVNI';
    document.getElementById('btn-guardar').textContent  = 'Registrar avistamiento';
    document.getElementById('form-avistamiento').reset();
    document.getElementById('f-cantidad').value = '1';
    document.getElementById('modal').classList.add('open');
  }

  // ── Abrir modal en modo EDITAR ───────────────────────────────
  function abrirEditar(id) {
    var av = avistamientos.find(function(a) { return a.id === id; });
    if (!av) return;

    editandoId = id;
    document.getElementById('modal-titulo').textContent = 'Editar Avistamiento';
    document.getElementById('btn-guardar').textContent  = 'Guardar cambios';

    document.getElementById('f-fecha').value          = av.fecha          || '';
    document.getElementById('f-hora').value           = av.hora           || '';
    document.getElementById('f-ubicacion').value      = av.ubicacion      || '';
    document.getElementById('f-cantidad').value       = av.cantidad       || 1;
    document.getElementById('f-forma').value          = av.forma          || 'No identificada';
    document.getElementById('f-registrado_por').value = av.registrado_por || '';
    document.getElementById('f-observaciones').value  = av.observaciones  || '';

    document.getElementById('modal').classList.add('open');
  }

  // ── Cerrar modal ─────────────────────────────────────────────
  function cerrarModal() {
    document.getElementById('modal').classList.remove('open');
    editandoId = null;
  }

  function cerrarSiOverlay(event) {
    if (event.target === document.getElementById('modal')) cerrarModal();
  }

  // ── Guardar (crear o editar) ─────────────────────────────────
  function guardar(event) {
    event.preventDefault();

    var datos = {
      fecha:          document.getElementById('f-fecha').value,
      hora:           document.getElementById('f-hora').value,
      ubicacion:      document.getElementById('f-ubicacion').value,
      cantidad:       parseInt(document.getElementById('f-cantidad').value, 10),
      forma:          document.getElementById('f-forma').value,
      registrado_por: document.getElementById('f-registrado_por').value,
      observaciones:  document.getElementById('f-observaciones').value,
    };

    if (editandoId !== null) {
      // Editar: reemplazar el elemento en la lista
      avistamientos = avistamientos.map(function(av) {
        return av.id === editandoId ? Object.assign({ id: editandoId }, datos) : av;
      });
    } else {
      // Crear: agregar al final de la lista
      datos.id = nextId;
      nextId++;
      avistamientos.push(datos);
    }

    cerrarModal();
    renderTabla();
  }

  // ── Eliminar ─────────────────────────────────────────────────
  function eliminar(id) {
    if (!confirm('¿Seguro que deseas eliminar este avistamiento?')) return;
    avistamientos = avistamientos.filter(function(av) { return av.id !== id; });
    renderTabla();
  }

  // ── Inicializar ──────────────────────────────────────────────
  renderTabla();
</script>

</body>
</html>
