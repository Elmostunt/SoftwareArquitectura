steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'API_PROXY_URL=$_API_PROXY_URL'
      - '--tag'
      - '$_IMAGE'
      - '.'

images:
  - '$_IMAGE'

substitutions:
  _API_PROXY_URL: 'http://LOAD_BALANCER_DNS_AQUI'
  _IMAGE: 'us-central1-docker.pkg.dev/PROJECT_ID/ovnis-repo/ovnis-frontend'
